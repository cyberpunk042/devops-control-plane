<!-- Content Tab -->
<div id="tab-content" class="tab-content">
    <style>
        .bk-folder-item:hover {
            background: var(--bg-tertiary);
        }

        .bk-folder-item.bk-folder-active {
            background: var(--accent-primary) !important;
            color: #fff !important;
            font-weight: 600;
        }

        .content-folder-card {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.7rem;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-inset);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            font-size: 0.82rem;
            user-select: none;
            flex-shrink: 0;
        }
        .content-folder-card:hover {
            border-color: var(--accent);
            background: var(--bg-tertiary);
        }
        .content-folder-card.active {
            border-color: var(--accent);
            background: var(--accent-glow);
            color: var(--accent);
            font-weight: 600;
        }
        .content-folder-card .folder-count {
            font-size: 0.68rem;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 0.05rem 0.3rem;
            border-radius: 4px;
        }
        .content-folder-card.active .folder-count {
            background: rgba(255,255,255,0.15);
            color: var(--accent);
        }

        #content-explore-all-btn.active {
            border-color: var(--accent) !important;
            background: var(--accent-glow) !important;
            color: var(--accent) !important;
        }
    </style>
    <header class="tab-header">
        <h1>📁 Content Vault</h1>
        <p class="subtitle">Manage documents, media, and encrypted archives</p>
    </header>

    <!-- Content sub-tabs -->
    <div class="content-modes" id="content-modes">
        <button class="content-mode active" data-mode="docs" onclick="contentSwitchMode('docs')">📝 Docs</button>
        <button class="content-mode" data-mode="media" onclick="contentSwitchMode('media')">🎬 Media</button>
        <button class="content-mode" data-mode="archive" onclick="contentSwitchMode('archive')">📦 Archive</button>
        <button class="content-mode" data-mode="chat" onclick="contentSwitchMode('chat')">💬 Chat</button>
    </div>

    <div class="grid">
        <div class="card full-width" style="min-height:300px">

            <!-- Folder selector bar -->
            <div id="content-folder-bar" style="display:none;margin-bottom:var(--space-md)">
                <!-- Action row: toggle + buttons -->
                <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.6rem">
                    <span id="content-summary" style="font-size:0.8rem;color:var(--text-muted)"></span>
                    <div style="margin-left:auto;display:flex;gap:0.5rem;align-items:center">
                        <button class="btn btn-sm" id="content-glossary-toggle-btn"
                            onclick="contentToggleGlossary()"
                            title="Toggle outline/glossary panel (Ctrl+Shift+O)"
                            style="font-size:0.72rem;padding:0.15rem 0.5rem;border-radius:6px;border:1px solid var(--border-subtle);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.15s">
                            📋 Outline
                        </button>
                        <button class="btn btn-sm" id="content-explore-all-btn"
                            onclick="contentToggleExploreAllBtn()"
                            title="Show all project directories, not just configured content folders"
                            style="font-size:0.72rem;padding:0.15rem 0.5rem;border-radius:6px;border:1px solid var(--border-subtle);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.15s">
                            🗂 Show All Folders
                        </button>
                        <button class="btn btn-primary btn-sm" id="content-upload-btn" onclick="contentShowUpload()"
                            title="Upload files" style="display:none">📤 Upload</button>
                        <button class="btn btn-secondary btn-sm" onclick="contentRefresh()" title="Refresh">🔄</button>
                    </div>
                </div>
                <!-- Folder cards strip -->
                <div id="content-folder-cards"
                    style="display:flex;gap:0.4rem;overflow-x:auto;padding-bottom:0.3rem;scrollbar-width:thin">
                </div>
                <!-- Hidden select for compatibility (contentToggleExploreAll uses it) -->
                <select id="content-folder-select" style="display:none"
                    onchange="contentLoadFolder(this.value)"></select>
            </div>

            <!-- Breadcrumb nav -->
            <div id="content-breadcrumb" style="display:none;margin-bottom:var(--space-sm);font-size:0.85rem"></div>

            <!-- Glossary + Browser flex container -->
            <div id="content-main-flex" style="display:flex;gap:0;min-height:200px">

                <!-- Glossary / Outline panel (left sidebar) -->
                <div id="content-glossary-panel" class="glossary-panel">
                    <div class="glossary-header">
                        <div class="glossary-mode-tabs">
                            <button class="glossary-mode-tab active" data-glossary-mode="outline"
                                onclick="_glossarySwitchMode('outline')">📋 Outline</button>
                            <button class="glossary-mode-tab" data-glossary-mode="glossary"
                                onclick="_glossarySwitchMode('glossary')">📚 Glossary</button>
                        </div>
                        <input type="text" class="glossary-search" id="glossary-search"
                            placeholder="🔍 Filter..." oninput="_glossaryFilter(this.value)">
                    </div>
                    <div class="glossary-tree" id="glossary-tree">
                        <p class="glossary-empty">No outline data</p>
                    </div>
                </div>

                <!-- File browser -->
                <div id="content-browser" style="flex:1;min-width:0">
                    <p class="empty-state">
                        <span style="font-size:2rem;display:block;margin-bottom:0.5rem">📂</span>
                        Loading content folders…
                    </p>
                </div>

            </div>

            <!-- Chat panel (sibling, hidden by default) -->
            <div id="content-chat-panel" style="display:none"></div>

            <!-- Status output -->
            <div id="content-output" style="display:none;margin-top:var(--space-md)">
                <pre id="content-terminal" class="terminal" translate="no"></pre>
            </div>
        </div>
    </div>
</div>

{% include 'partials/_content_modals.html' %}
