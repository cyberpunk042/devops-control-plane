<body>
    <!-- Tab Navigation -->
    <nav class="tabs">
        <div class="tabs-brand" onclick="toggleTabsMenu()">
            <div class="logo-icon">⚡</div>
            <span class="logo-text">Control Plane</span>
            <span class="tabs-menu-chevron" id="tabs-menu-chevron">Menu ▾</span>
        </div>
        <div class="tabs-group" id="tabs-group">
            <button class="tab active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab" onclick="switchTab('wizard')">🧙 Setup</button>
            <button class="tab" onclick="switchTab('secrets')">🔐 Secrets</button>

            <button class="tab" onclick="switchTab('content')">📁 Content</button>
            <button class="tab" onclick="switchTab('integrations')">🔌 Integrations</button>
            <button class="tab" onclick="switchTab('devops')">🛠️ DevOps</button>
            <button class="tab" onclick="switchTab('audit')">🔬 Audit</button>
            <button class="tab" onclick="switchTab('debugging')">🐛 Debugging</button>
        </div>
        <div class="nav-controls">
            <div id="google_translate_element"></div>
            <div class="lang-btn" id="lang-btn" onclick="toggleLangDropdown()">
                <span id="lang-flag">🌐</span>
                <span id="lang-label">EN</span>
                <span style="font-size:0.6rem;">▾</span>
                <div class="lang-dropdown" id="lang-dropdown"></div>
            </div>
            <div class="gh-menu" id="gh-menu">
                <span>🔗</span>
                <span style="font-size:0.6rem;">▾</span>
                <div class="gh-dropdown">
                    <div>
                        <a id="gh-link-repo" href="#" target="_blank">📦 Repository</a>
                        <a id="gh-link-actions" href="#" target="_blank">⚡ Actions</a>
                        <a id="gh-link-pages" href="#" target="_blank">🌐 Pages</a>
                        <a id="gh-link-secrets" href="#" target="_blank">🔐 Secrets</a>
                        <a id="gh-link-settings" href="#" target="_blank">⚙️ Settings</a>
                    </div>
                </div>
            </div>
            <span id="dev-mode-badge" class="dev-badge" style="display:none"
                title="Stage Debugger available">🔧 DEV</span>
            <span id="health-badge" class="status-badge ok">
                <span class="status-dot"></span>
                <span>Healthy</span>
            </span>
            <div class="settings-gear" id="settings-gear" onclick="toggleSettingsPanel()">
                ⚙️
                <div class="settings-panel" id="settings-panel">
                    <div class="settings-panel-header">Preferences</div>
                    <div class="settings-panel-body" id="settings-panel-body"></div>
                </div>
            </div>
            <div class="notif-trigger" id="notif-trigger"
                 onclick="_toggleNotifPanel()" title="Notifications &amp; Errors">
                🔔
                <span class="notif-count-badge" id="notif-count-badge"
                      style="display:none">0</span>
                <span class="notif-error-dot" id="notif-error-dot"
                      style="display:none"></span>
            </div>
        </div>
    </nav>
    <div class="refresh-bar" id="refresh-bar">
        <div class="refresh-bar-inner"></div>
    </div>
