<script>
/* ═══════════════════════════════════════════════════════════════════
 *  Event Stream — SSE client + reactive state store (Phase 7B)
 *
 *  Connects to GET /api/events (Server-Sent Events) and maintains
 *  an in-memory state store.  When the server publishes cache:done,
 *  the store updates and any registered renderers re-paint.
 *
 *  Depends on: _globals.html (cardStore, cardInvalidate, toast)
 *  Consumed by: any card script that calls storeRegister(key, fn)
 *
 *  This is ADDITIVE — existing api()/cardCached() flows are untouched.
 *  Cards that haven't opted in continue working as before.
 * ═══════════════════════════════════════════════════════════════════ */

    // ── State Store ────────────────────────────────────────────────
    //
    // In-memory store keyed by cache key (e.g. "testing", "docker").
    // When data arrives (via SSE or explicit set), registered renderers
    // are notified.  sessionStorage is also updated for backward compat.

    const _store = {};               // key → data dict
    const _renderers = {};           // key → [renderFn, ...]
    const _staleKeys = new Set();    // keys marked stale by watcher

    /** Update the store for a key and notify renderers. */
    function storeSet(key, data) {
        _store[key] = data;
        _staleKeys.delete(key);      // fresh data clears stale marker

        // Clear stale visual indicator on the DOM
        document.querySelectorAll(`[data-cache-key="${key}"]`).forEach(el => {
            el.classList.remove('stale');
            el.title = '';
        });

        // Keep sessionStorage in sync (backward compat with cardCached)
        cardStore(key, data);

        // Notify registered renderers
        const fns = _renderers[key];
        if (fns) {
            for (const fn of fns) {
                try { fn(data); } catch (e) {
                    console.error(`[EventStream] render ${key}:`, e);
                }
            }
        }
    }

    /** Read from the store; returns null if not present. */
    function storeGet(key) {
        return _store[key] || null;
    }

    /** Register a render function for a cache key.
     *  The function is called with (data) whenever storeSet(key, ...) fires.
     *  Multiple renderers per key are supported. */
    function storeRegister(key, renderFn) {
        (_renderers[key] ??= []).push(renderFn);
    }

    /** Check if a key is marked stale by the watcher. */
    function storeIsStale(key) {
        return _staleKeys.has(key);
    }

    // ── SSE Connection Manager ─────────────────────────────────────

    const _sse = {
        /** @type {EventSource|null} */
        source: null,
        /** Server instance ID — changes on server restart. */
        instanceId: null,
        /** Last received sequence number (for replay on reconnect). */
        lastSeq: 0,
        /** Whether the SSE connection is currently open. */
        connected: false,
        /** Known event types to listen for. */
        _eventTypes: [
            'sys:ready', 'sys:warming', 'sys:warm', 'sys:heartbeat',
            'state:snapshot',
            'cache:miss', 'cache:done', 'cache:error', 'cache:bust',
            'state:stale',
            'audit:pending', 'audit:saved',
            'audit:progress', 'audit:complete',
            'run:started', 'run:completed',
            'auth:needed',
            'github:status', 'ledger:conflict',
            'index:ready',
        ],

        /** Open the SSE connection. Safe to call multiple times. */
        connect() {
            if (this.source) return;

            const url = '/api/events' + (this.lastSeq ? '?since=' + this.lastSeq : '');
            this.source = new EventSource(url);

            // Register a listener for each known event type
            for (const type of this._eventTypes) {
                this.source.addEventListener(type, (e) => this._dispatch(type, e));
            }

            this.source.onopen = () => {
                this.connected = true;
                console.debug('[SSE] connected');
            };

            this.source.onerror = () => {
                // EventSource auto-reconnects and sends Last-Event-Id header.
                // We just update our state flag.
                if (this.connected) {
                    this.connected = false;
                    console.debug('[SSE] disconnected — will auto-reconnect');
                }
            };
        },

        /** Route an SSE event to the appropriate handler. */
        _dispatch(type, sseEvent) {
            let payload;
            try {
                payload = JSON.parse(sseEvent.data);
            } catch (e) {
                console.error('[SSE] bad JSON:', sseEvent.data);
                return;
            }

            // Track sequence for replay on reconnect
            if (payload.seq) {
                this.lastSeq = payload.seq;
            }

            switch (type) {
                case 'sys:ready':      this._onReady(payload);        break;
                case 'state:snapshot': this._onSnapshot(payload);     break;
                case 'cache:done':     this._onCacheDone(payload);    break;
                case 'cache:miss':     this._onCacheMiss(payload);    break;
                case 'cache:error':    this._onCacheError(payload);   break;
                case 'cache:bust':     this._onCacheBust(payload);    break;
                case 'state:stale':    this._onStateStale(payload);   break;
                case 'audit:pending':  this._onAuditPending(payload); break;
                case 'audit:saved':    this._onAuditSaved(payload);   break;
                case 'run:started':    this._onRunStarted(payload);   break;
                case 'run:completed':  this._onRunCompleted(payload); break;
                case 'auth:needed':    this._onAuthNeeded(payload);   break;
                case 'github:status':  this._onGithubStatus(payload); break;
                case 'ledger:conflict': this._onLedgerConflict(payload); break;
                case 'audit:progress': this._onAuditProgress(payload);  break;
                case 'audit:complete': this._onAuditComplete(payload);  break;
                case 'stream:start':   this._onStreamStart(payload);   break;
                case 'stream:line':    this._onStreamLine(payload);    break;
                case 'stream:done':    this._onStreamDone(payload);    break;
                case 'server:restarting': this._onServerRestarting(payload); break;
                case 'index:ready':    this._onIndexReady(payload);    break;
                // sys:warming, sys:warm, sys:heartbeat — silently ignored for now
            }
        },

        // ── Event Handlers ─────────────────────────────────────────

        /** Server hello — detect restarts. */
        _onReady(payload) {
            const newId = payload.data?.instance_id;
            if (this.instanceId && this.instanceId !== newId) {
                // Server restarted — discard stale local state
                console.info('[SSE] server restarted (instance %s → %s), clearing store',
                    this.instanceId, newId);
                for (const key of Object.keys(_store)) {
                    delete _store[key];
                }
                _staleKeys.clear();
                cardInvalidateAll();
            }
            this.instanceId = newId;
            this.connected = true;
        },

        /** Full state replacement (new connection or buffer exhausted). */
        _onSnapshot(payload) {
            const snapshot = payload.data || {};
            for (const [key, entry] of Object.entries(snapshot)) {
                if (entry.data) {
                    storeSet(key, entry.data);
                }
            }
            console.debug('[SSE] snapshot loaded (%d keys)', Object.keys(snapshot).length);
        },

        /** Card computation finished — fresh data available. */
        _onCacheDone(payload) {
            const key = payload.key;
            if (!key) return;

            // The payload.data contains the full card data
            storeSet(key, payload.data);

            // Clear any loading indicator that _onCacheMiss may have set
            _sse._clearLoadingIndicator(key);

            const dur = payload.duration_s;
            if (dur != null) {
                console.debug('[SSE] cache:done %s (%.2fs)', key, dur);
            }
        },

        /** Card computation starting — show loading indicator if visible. */
        _onCacheMiss(payload) {
            const key = payload.key;
            if (!key) return;

            // Try common badge/detail ID patterns
            // DevOps:        devops-{key}-badge, devops-{key}-detail
            // Integrations:  int-{key}-badge, int-{key}-detail
            // Audit:         audit-{key}-badge, audit-{key}-detail
            for (const prefix of ['devops-', 'int-', 'audit-']) {
                const badge = document.getElementById(prefix + key + '-badge');
                const detail = document.getElementById(prefix + key + '-detail');
                if (badge) {
                    badge.className = 'status-badge';
                    badge.textContent = '—';
                }
                if (detail && !detail.querySelector('.spinner')) {
                    // Only set spinner if there isn't one already
                    detail.innerHTML = '<span class="spinner"></span>';
                }
            }
        },

        /** Card computation failed. */
        _onCacheError(payload) {
            const key = payload.key;
            if (!key) return;

            const msg = payload.error || 'Computation failed';

            for (const prefix of ['devops-', 'int-', 'audit-']) {
                const badge = document.getElementById(prefix + key + '-badge');
                const detail = document.getElementById(prefix + key + '-detail');
                if (badge) {
                    badge.className = 'status-badge failed';
                    badge.innerHTML = '<span class="status-dot"></span>Error';
                }
                if (detail) {
                    detail.innerHTML = `<p class="empty-state-sm" style="color:var(--error)">${esc(msg)}</p>`;
                }
            }
        },

        /** Cache invalidated (user clicked refresh or cascade). */
        _onCacheBust(payload) {
            const scope = payload.data?.scope || '';
            console.debug('[SSE] cache:bust scope=%s', scope);
            // The explicit bust from the UI already invalidated sessionStorage.
            // This handler is for CROSS-TAB sync: another tab busted →
            // this tab should know.  We mark keys stale but don't re-render
            // (the subsequent cache:miss → cache:done events will handle rendering).
        },

        /** File watcher detected underlying files changed. */
        _onStateStale(payload) {
            const key = payload.key;
            if (!key) return;

            _staleKeys.add(key);

            // Add stale indicator to card age badges
            document.querySelectorAll(`[data-cache-key="${key}"]`).forEach(el => {
                el.classList.add('stale');
                el.title = 'Underlying files changed — click 🔄 to refresh';
            });

            console.debug('[SSE] state:stale %s (stale by %.1fs)',
                key, payload.data?.stale_by_s || 0);
        },

        /** A new pending audit snapshot was staged. */
        _onAuditPending(payload) {
            const key = payload.key;        // card_key e.g. "security"
            const sid = payload.snapshot_id; // e.g. "security_20260218_150300"
            if (!key || !sid) return;

            // Track pending counts
            window._pendingAudits = window._pendingAudits || {};
            (window._pendingAudits[key] ??= []).push(sid);

            // Show per-card badge(s)
            document.querySelectorAll('.audit-pending-badge[data-audit-key="' + key + '"]')
                .forEach(b => { b.style.display = 'inline-flex'; });

            // Update global pending badge (in tab header)
            _sse._updatePendingBadge();

            console.debug('[SSE] audit:pending %s (%s)', key, sid);
        },

        /** An audit snapshot was saved to git. */
        _onAuditSaved(payload) {
            const sid = payload.key;  // snapshot_id
            if (!sid) return;

            // Remove from pending tracking
            if (window._pendingAudits) {
                for (const key of Object.keys(window._pendingAudits)) {
                    window._pendingAudits[key] = window._pendingAudits[key].filter(id => id !== sid);
                    if (window._pendingAudits[key].length === 0) {
                        delete window._pendingAudits[key];
                        // Hide per-card badge(s)
                        document.querySelectorAll('.audit-pending-badge[data-audit-key="' + key + '"]')
                            .forEach(b => { b.style.display = 'none'; });
                    }
                }
            }

            _sse._updatePendingBadge();
            console.debug('[SSE] audit:saved %s', sid);
        },

        /** Update the global pending audit badges in tab headers. */
        _updatePendingBadge() {
            const pa = window._pendingAudits || {};
            let devopsTotal = 0;
            let projectTotal = 0;

            for (const [key, arr] of Object.entries(pa)) {
                if (key.startsWith('audit:')) {
                    projectTotal += arr.length;
                } else {
                    devopsTotal += arr.length;
                }
            }

            const total = devopsTotal + projectTotal;

            // DevOps tab global badge
            const badge = document.getElementById('pending-audits-badge');
            if (badge) {
                if (devopsTotal > 0) {
                    badge.textContent = devopsTotal;
                    badge.style.display = '';
                    badge.title = `${devopsTotal} unsaved devops audit(s) — click to manage`;
                } else {
                    badge.style.display = 'none';
                }
            }

            // Audit tab global badge
            const pBadge = document.getElementById('pending-project-audits-badge');
            if (pBadge) {
                if (projectTotal > 0) {
                    pBadge.textContent = projectTotal;
                    pBadge.style.display = '';
                    pBadge.title = `${projectTotal} unsaved project audit(s) — click to manage`;
                } else {
                    pBadge.style.display = 'none';
                }
            }
        },

        /** A run operation has started. */
        _onRunStarted(payload) {
            const data = payload.data || {};
            const subtype = data.subtype || data.type || '';
            console.debug('[SSE] run:started %s (%s)', payload.key, subtype);

            const cardIds = this._runSubtypeToCardIds(subtype);
            for (const cardId of cardIds) {
                const badge = this._ensureRunBadge(cardId);
                if (badge) {
                    badge.style.display = 'inline-flex';
                    badge.querySelector('.run-status-dot').className = 'run-status-dot running';
                    badge.querySelector('.run-badge-label').textContent = 'running…';
                    badge.title = subtype + ' in progress';
                }
            }
        },

        /** A run operation has completed. */
        _onRunCompleted(payload) {
            const data = payload.data || {};
            const subtype = data.subtype || data.type || 'run';
            const status = data.status || 'ok';
            const summary = data.summary || '';
            const dur = data.duration_ms ? ` (${(data.duration_ms / 1000).toFixed(1)}s)` : '';
            const icon = status === 'ok' ? '✅' : '❌';
            const level = status === 'ok' ? 'success' : (status === 'failed' ? 'error' : 'info');

            // Build context snippet from metadata for richer toast
            const meta = data.metadata || {};
            const ctxParts = [];
            // Pick the most informative field for the toast one-liner
            for (const k of ['filename', 'file', 'service', 'domain', 'name', 'target', 'namespace', 'path']) {
                if (meta[k]) { ctxParts.push(String(meta[k])); break; }
            }
            // Add a quantity if present
            for (const k of ['count', 'files', 'restored', 'pushed', 'deleted', 'record_count']) {
                if (meta[k] !== undefined && meta[k] !== null) { ctxParts.push(`${k}=${meta[k]}`); break; }
            }
            const ctxStr = ctxParts.length > 0 ? ` · ${ctxParts.join(', ')}` : '';

            if (typeof toast === 'function') {
                toast(`${icon} ${subtype}${dur}: ${summary || status}${ctxStr}`, level);
            }
            console.debug('[SSE] run:completed %s → %s%s', payload.key, status, dur);

            const cardIds = this._runSubtypeToCardIds(subtype);
            for (const cardId of cardIds) {
                const badge = this._ensureRunBadge(cardId);
                if (badge) {
                    badge.style.display = 'inline-flex';
                    const dot = badge.querySelector('.run-status-dot');
                    dot.className = 'run-status-dot ' + (status === 'ok' ? 'success' : 'failed');
                    badge.querySelector('.run-badge-label').textContent = status;
                    const runId = data.run_id || '';
                    // Build rich tooltip with metadata
                    let tip = `${subtype}${dur} — ${summary || status}`;
                    const metaKeys = Object.keys(meta);
                    if (metaKeys.length > 0) {
                        tip += '\n──────────';
                        for (const mk of metaKeys) {
                            const mv = typeof meta[mk] === 'object' ? JSON.stringify(meta[mk]) : String(meta[mk]);
                            tip += `\n${mk}: ${mv}`;
                        }
                    }
                    if (runId) tip += `\n@run:${runId}`;
                    badge.title = tip;
                }
            }
        },

        /** Server detected an operation that requires auth. */
        _onAuthNeeded(payload) {
            const data = payload.data || {};
            console.info('[SSE] auth:needed — %s', data.needs || 'unknown');

            // ── GitHub CLI gates ──
            if (data.needs === 'gh_install' || data.needs === 'gh_auth') {
                // Update gh status cache, then trigger the gate
                if (_ghAuthStatus) {
                    _ghAuthStatus.installed = data.needs !== 'gh_install';
                    _ghAuthStatus.authenticated = false;
                }
                if (typeof ensureGhReady === 'function') ensureGhReady();
                return;
            }

            // ── Git identity gate ──
            if (data.needs === 'git_identity') {
                if (typeof showGitIdentityModal === 'function') showGitIdentityModal();
                return;
            }

            // ── Git SSH / HTTPS gates ──
            // Only skip if the auth modal is already displayed
            if (_gitAuthModalOpen) return;

            // Update cached auth status
            _gitAuthStatus = { ok: false, needs: data.needs, remote_url: data.remote_url, ssh_key: data.ssh_key };

            // Show the auth modal with 'event' context so the user
            // sees an explanation of WHY the prompt appeared.
            if (data.needs === 'ssh_passphrase') {
                showGitAuthModal('ssh', 'event');
            } else if (data.needs === 'https_credentials') {
                showGitAuthModal('https', 'event');
            }
        },

        /** GitHub status — outage detected by backend. */
        _lastGhStatusShown: '',
        _onGithubStatus(payload) {
            const data = payload.data || {};
            console.warn('[SSE] github:status —', data.message || data.description);

            // Only show once per status change (avoid spamming on every poll)
            const statusKey = `${data.status}:${data.git_operations}`;
            if (statusKey === this._lastGhStatusShown) return;
            this._lastGhStatusShown = statusKey;

            // Show a persistent warning toast
            const gitOps = (data.git_operations || '').replace(/_/g, ' ');
            const msg = `⚠️ GitHub is experiencing issues — Git Operations: ${gitOps}. Remote sync may fail until GitHub resolves this.`;
            toast(msg, 'warning', 15000);

            // Also update a banner if the status-bar exists
            let banner = document.getElementById('github-status-banner');
            if (!banner) {
                banner = document.createElement('div');
                banner.id = 'github-status-banner';
                banner.style.cssText = 'background: var(--clr-warning, #f59e0b); color: #000; padding: 8px 16px; text-align: center; font-size: 0.85rem; font-weight: 500; position: sticky; top: 0; z-index: 9999;';
                document.body.prepend(banner);
            }
            banner.textContent = `⚠️ GitHub Outage — ${data.description || 'Git Operations degraded'}. Remote sync may be affected.`;
            banner.style.display = 'block';

            // Auto-hide banner after 2 minutes (status is cached for 60s server-side)
            setTimeout(() => {
                if (banner) banner.style.display = 'none';
                this._lastGhStatusShown = '';
            }, 120000);
        },

        /** Ledger rebase conflict — update badge and open sync modal. */
        _onLedgerConflict(payload) {
            const data = payload.data || {};
            console.warn('[SSE] ledger:conflict —', data.error);

            // Update badge to conflict state
            if (typeof ledgerUpdateBadge === 'function') {
                ledgerUpdateBadge('conflict');
            }

            if (!data.needs_resolution) {
                toast(data.error || 'Ledger sync issue.', 'warning', 10000);
                return;
            }

            // Open the full sync status modal (if not already open)
            if (typeof ledgerOpenSyncModal === 'function') {
                ledgerOpenSyncModal();
            }
        },

        /** Audit scan progress update — track in global state, dispatch DOM event. */
        _onAuditProgress(payload) {
            const data = payload.data || {};
            const taskId = data.task_id;
            if (!taskId) return;

            // Maintain global scan state
            if (!window._auditScan) window._auditScan = {};
            window._auditScan[taskId] = {
                status: 'running',
                progress: data.progress || 0,
                phase: data.phase || '',
                detail: data.detail || '',
                updatedAt: Date.now(),
            };

            console.debug('[SSE] audit:progress %s — %s (%.0f%%)',
                taskId, data.phase, (data.progress || 0) * 100);

            // Dispatch DOM event for audit manager UI
            document.dispatchEvent(new CustomEvent('audit-scan-progress', { detail: data }));
        },

        /** Audit scan completed — update global state, notify UI. */
        _onAuditComplete(payload) {
            const data = payload.data || {};
            const taskId = data.task_id;
            if (!taskId) return;

            const ok = !data.error;
            const dur = data.duration_ms ? ` (${(data.duration_ms / 1000).toFixed(1)}s)` : '';

            // Update global scan state
            if (!window._auditScan) window._auditScan = {};
            window._auditScan[taskId] = {
                status: ok ? 'done' : 'error',
                progress: 1.0,
                phase: 'complete',
                detail: ok ? `Completed${dur}` : (data.error || 'Failed'),
                completedAt: Date.now(),
                duration_ms: data.duration_ms || 0,
            };

            if (ok) {
                console.info('[SSE] audit:complete %s — success%s', taskId, dur);
                if (typeof toast === 'function') {
                    toast(`✅ Audit scan complete${dur}`, 'success');
                }
            } else {
                console.error('[SSE] audit:complete %s — error: %s', taskId, data.error);
                if (typeof toast === 'function') {
                    toast(`❌ Audit scan failed: ${data.error || 'unknown'}`, 'error');
                }
            }

            // Dispatch DOM event for audit manager UI
            document.dispatchEvent(new CustomEvent('audit-scan-complete', { detail: data }));
        },

        // ── Streaming subprocess output ────────────────────────────

        /** A streaming operation started — initialise buffer. */
        _onStreamStart(payload) {
            const data = payload.data || {};
            const id = data.stream_id;
            if (!id) return;

            // Global streams map: { stream_id: { lines: [], done: false, ... } }
            if (!window._streams) window._streams = {};
            window._streams[id] = {
                lines: [],
                done: false,
                label: data.label || '',
                startedAt: Date.now(),
            };
            console.debug('[SSE] stream:start %s (%s)', id, data.label || '');

            // Dispatch custom event so any open terminal panel can react
            document.dispatchEvent(new CustomEvent('stream-start', { detail: data }));
        },

        /** A line of output from a streaming operation. */
        _onStreamLine(payload) {
            const data = payload.data || {};
            const id = data.stream_id;
            if (!id) return;

            if (!window._streams) window._streams = {};
            if (!window._streams[id]) {
                // Late join — create the entry
                window._streams[id] = { lines: [], done: false, label: '', startedAt: Date.now() };
            }
            window._streams[id].lines.push(data.line || '');

            // Dispatch custom event with the line
            document.dispatchEvent(new CustomEvent('stream-line', { detail: data }));
        },

        /** A streaming operation completed. */
        _onStreamDone(payload) {
            const data = payload.data || {};
            const id = data.stream_id;
            if (!id) return;

            if (window._streams && window._streams[id]) {
                window._streams[id].done = true;
                window._streams[id].exitCode = data.exit_code;
                window._streams[id].ok = data.ok;
            }

            const ok = data.ok;
            const label = window._streams?.[id]?.label || id;
            if (ok) {
                console.debug('[SSE] stream:done %s — success (%d lines)', id, data.line_count || 0);
            } else {
                console.warn('[SSE] stream:done %s — failed (exit %d)', id, data.exit_code);
            }

            // Dispatch custom event
            document.dispatchEvent(new CustomEvent('stream-done', { detail: data }));
        },

        // ── Server lifecycle ───────────────────────────────────────

        /** Server is about to restart — show reconnecting state. */
        _onServerRestarting(payload) {
            const data = payload.data || {};
            console.info('[SSE] server:restarting —', data.message || 'Server restarting...');
            toast(data.message || 'Server restarting...', 'info', 5000);

            // The SSE connection will drop — _onReady will fire on reconnect
            // and clear stale state. No further action needed here.
        },

        /**
         * Project index finished building — T5 symbols are now available.
         * If the current preview was rendered without T5 data, re-annotate.
         */
        _onIndexReady(payload) {
            const data = payload.data || {};
            console.debug('[SSE] index:ready — %d symbols, %d peek pages',
                data.symbols || 0, data.peek_pages || 0);

            // Only act if the current preview is waiting for T5 data
            if (typeof _peekSymbolsPending !== 'undefined' && _peekSymbolsPending
                && typeof previewCurrentPath !== 'undefined' && previewCurrentPath) {

                const body = document.getElementById('content-preview-body');
                if (!body) return;

                console.info('[Peek] Index ready — re-annotating %s with T5 symbols', previewCurrentPath);
                _peekSymbolsPending = false;

                // Unwrap all pending spans back to text nodes so the
                // annotator can re-process them with resolved data
                const pendingSpans = body.querySelectorAll('.peek-link--pending');
                for (const span of pendingSpans) {
                    const text = document.createTextNode(span.textContent);
                    span.parentNode.replaceChild(text, span);
                }
                // Normalize adjacent text nodes after unwrapping
                body.normalize();

                // Re-fetch peek refs (now with T5 data) and annotate
                _resolvePeekLinks(previewCurrentPath, '', body);
            }
        },

        /**
         * Map run subtype → candidate card element IDs.
         * Cards live on two tabs with different prefixes:
         *   DevOps:       devops-{key}-card
         *   Integrations: int-{key}-card
         */
        _runSubtypeToCardIds(subtype) {
            if (!subtype) return [];
            const map = {
                /* K8s + Helm */
                'deploy:k8s': 'k8s', 'deploy:k8s_scale': 'k8s', 'destroy:k8s': 'k8s',
                'generate:k8s_manifests': 'k8s', 'generate:k8s_wizard': 'k8s',
                'install:helm': 'k8s', 'deploy:helm_upgrade': 'k8s', 'plan:helm_template': 'k8s',
                /* Terraform */
                'deploy:terraform': 'terraform', 'plan:terraform': 'terraform',
                'validate:terraform': 'terraform', 'destroy:terraform': 'terraform',
                'setup:terraform': 'terraform', 'format:terraform': 'terraform',
                'generate:terraform': 'terraform', 'setup:terraform_ws': 'terraform',
                /* Docker */
                'build:docker': 'docker', 'deploy:docker_up': 'docker',
                'destroy:docker_down': 'docker', 'deploy:docker_restart': 'docker',
                'destroy:docker_prune': 'docker', 'install:docker_pull': 'docker',
                'test:docker_exec': 'docker', 'destroy:docker_rm': 'docker',
                'destroy:docker_rmi': 'docker',
                'generate:dockerfile': 'docker', 'generate:dockerignore': 'docker',
                'generate:compose': 'docker', 'generate:compose_wizard': 'docker',
                'generate:docker_write': 'docker',
                /* Testing */
                'test:run': 'testing', 'test:coverage': 'testing',
                /* Quality */
                'validate:quality': 'quality', 'validate:lint': 'quality',
                'validate:typecheck': 'quality', 'test:quality': 'quality',
                'format:quality': 'quality', 'generate:quality_config': 'quality',
                /* Packages */
                'install:packages': 'packages', 'install:packages_update': 'packages',
                /* Docs */
                'generate:changelog': 'docs', 'generate:readme': 'docs',
                /* Env / Infra */
                'generate:env_example': 'env', 'generate:env': 'env',
                /* Git */
                'git:commit': 'git', 'git:pull': 'git', 'git:push': 'git',
                /* CI / GH */
                'ci:gh_dispatch': 'ci',
                'setup:gh_repo': 'gh', 'setup:gh_visibility': 'gh',
                'setup:gh_logout': 'gh', 'setup:gh_default_branch': 'gh',
                /* Pages */
                'build:pages_segment': 'pages', 'build:pages_all': 'pages',
                'build:pages_merge': 'pages', 'deploy:pages': 'pages',
                'setup:pages': 'pages', 'generate:pages_ci': 'pages',
            };
            const key = map[subtype];
            if (!key) return [];

            /* DevOps tab uses devops-{key}-card, Integrations uses int-{key}-card.
               Also handle int-tf-card (short alias for terraform). */
            const intKey = key === 'terraform' ? 'tf' : key;
            const ids = ['devops-' + key + '-card', 'int-' + intKey + '-card'];
            return ids;
        },

        /** Get-or-create a run badge element inside a card header. */
        _ensureRunBadge(cardId) {
            const badgeId = cardId + '-run-badge';
            let badge = document.getElementById(badgeId);
            if (badge) return badge;

            const card = document.getElementById(cardId);
            if (!card) return null;

            const header = card.querySelector('.card-header');
            if (!header) return null;

            badge = document.createElement('span');
            badge.id = badgeId;
            badge.className = 'run-activity-badge';
            badge.style.display = 'none';
            badge.innerHTML = '<span class="run-status-dot"></span>'
                + '<span class="run-badge-label"></span>';
            header.appendChild(badge);
            return badge;
        },


        // ── Helpers ────────────────────────────────────────────────

        /** Remove loading spinner for a card (called after cache:done). */
        _clearLoadingIndicator(key) {
            // If the card still shows a spinner but we just got data,
            // the registered renderer will overwrite it.  No extra work needed.
        },

        /** Disconnect the SSE stream (for cleanup / testing). */
        disconnect() {
            if (this.source) {
                this.source.close();
                this.source = null;
                this.connected = false;
                console.debug('[SSE] disconnected (manual)');
            }
        },
    };

    // ── Hydrate from pre-injected state (Phase 7C) ───────────────────
    // The server embeds cached card data as __INITIAL_STATE__ in the HTML.
    // We populate _store + sessionStorage SILENTLY (no storeSet) because
    // renderers haven't been registered yet (those scripts load later).
    // When loadXxxCard() runs, storeGet() finds data → instant render.

    if (window.__INITIAL_STATE__) {
        let _hydrated = 0;
        for (const [key, entry] of Object.entries(window.__INITIAL_STATE__)) {
            if (entry.data) {
                _store[key] = entry.data;        // populate in-memory store
                cardStore(key, entry.data);       // sync sessionStorage (backward compat)
                _hydrated++;
            }
        }
        console.debug('[EventStream] hydrated %d keys from __INITIAL_STATE__', _hydrated);
        delete window.__INITIAL_STATE__;          // GC
    }

    // ── Auto-connect on page load ───────────────────────────────────
    // The SSE connection opens immediately.  It runs alongside the
    // existing api()-based card loading.  As cards migrate to storeRegister(),
    // the SSE-delivered data becomes the primary source.

    _sse.connect();
