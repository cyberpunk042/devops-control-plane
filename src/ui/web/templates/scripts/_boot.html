<script>
    // ── Boot ────────────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', async () => {
        // Dev mode identity check (non-blocking — don't delay critical paint)
        _bootDevMode();

        // Restore tab from URL hash FIRST — so the correct tab is visible instantly
        restoreFromHash();

        // ── Chrome sign-in flow ──
        // When Chrome restarts with #chrome-signin&email=EMAIL, auto-trigger
        // the CDP-based sign-in flow (open sync settings, fill email).
        if (location.hash.startsWith('#chrome-signin')) {
            const params = new URLSearchParams(location.hash.replace('#chrome-signin', '').replace('&', '?').slice(1) || '');
            // Parse email from hash: #chrome-signin&email=user@example.com
            let signinEmail = '';
            const hashParts = location.hash.split('&');
            for (const part of hashParts) {
                if (part.startsWith('email=')) {
                    signinEmail = decodeURIComponent(part.slice(6));
                }
            }

            // Show a visible status card while we work
            const main = document.querySelector('.main-content') || document.body;
            const card = document.createElement('div');
            card.id = 'chrome-signin-card';
            card.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);' +
                'z-index:9999;background:var(--surface-2,#1e1e2e);border:1px solid var(--accent,#7c3aed);' +
                'border-radius:12px;padding:2rem 2.5rem;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5);' +
                'min-width:340px;font-family:inherit';
            card.innerHTML =
                '<div style="font-size:2rem;margin-bottom:12px">🔑</div>' +
                '<div style="font-size:1rem;font-weight:700;margin-bottom:8px;color:var(--text,#fff)">Signing in to Chrome</div>' +
                '<div style="font-size:0.8rem;color:var(--text-muted,#aaa);margin-bottom:16px">' +
                (signinEmail ? 'Pre-filling <strong>' + signinEmail + '</strong>…' : 'Opening Chrome sign-in…') +
                '</div>' +
                '<div id="chrome-signin-status" style="font-size:0.75rem;color:var(--text-muted,#999)">⏳ Waiting for Chrome sync…</div>';
            document.body.appendChild(card);

            // Clear the hash so it doesn't persist
            history.replaceState(null, '', location.pathname + '#dashboard');

            // Auto-trigger the sign-in flow
            if (signinEmail) {
                _autoTriggerChromeSignin(signinEmail);
            }
        }

        // ── First-launch detection ──
        // If no explicit hash was set (user landed on root), check if project
        // is configured. If not → redirect to the wizard.
        if (!location.hash || location.hash === '#dashboard') {
            try {
                const cached = cardCached('project-status');
                const ps = cached || await api('/project/status');
                if (!cached) cardStore('project-status', ps);
                const proj = (ps.integrations || {}).project || {};
                if (proj.status === 'missing') {
                    switchTab('wizard');
                    toast('👋 Welcome! Let\u2019s set up your project.', 'info');
                }
            } catch (_) { /* status endpoint unavailable — continue normally */ }
        }

        // ── Post-wizard "Next Steps" ──
        // If the wizard just saved (flag set by wizard save), show next steps.
        if (window._showNextStepsAfterSave) {
            window._showNextStepsAfterSave = false;
            _showPostWizardNextSteps();
        }

        // Critical path — visible on landing (both fast)
        await Promise.all([
            loadProjectPulse(),
            loadToolsStatus(),
        ]);

        // Activate dashboard assistant (cards are rendered, panel can listen)
        activateDashboardAssistant();

        // Deferred — heavier probes, load after critical paint
        Promise.allSettled([
            loadCapabilities(),
            loadSetupProgress(),
            loadProjectGrade(),
            checkGitAuth(),
            checkGhStatus(),
        ]).then(() => {
            loadAttentionItems();
            // Re-activate to pick up new dynamic children from deferred loads
            activateDashboardAssistant();
        });
    });

    /** Show a "Next Steps" modal after the wizard saves project.yml. */
    async function _showPostWizardNextSteps() {
        let status;
        try {
            status = await api('/project/status');
        } catch (_) { return; }

        const integrations = status.integrations || {};

        // Fetch user prefs so we don't suggest integrations the user hid
        let prefs = {};
        try { prefs = await api('/devops/prefs'); } catch (_) {}

        const incomplete = Object.entries(integrations)
            .filter(([k, v]) => v.status !== 'ready' && prefs[k] !== 'hidden' && prefs['int:' + k] !== 'hidden')
            .slice(0, 3);

        if (incomplete.length === 0) return; // everything's configured already

        // Use first visible incomplete integration as the suggestion
        // (backend suggested_next ignores user prefs and may be cached/stale)
        let suggested = incomplete[0][0];

        const meta = {
            git: { icon: '🔀', label: 'Git Repository' },
            docker: { icon: '🐳', label: 'Docker' },
            github: { icon: '🐙', label: 'GitHub' },
            cicd: { icon: '⚡', label: 'CI/CD Pipeline' },
            k8s: { icon: '☸️', label: 'Kubernetes' },
            terraform: { icon: '🏗️', label: 'Terraform' },
            pages: { icon: '📄', label: 'Pages' },
            dns: { icon: '🌐', label: 'DNS / Domain' },
        };

        let rows = '';
        for (const [key, info] of incomplete) {
            const m = meta[key] || { icon: '❓', label: key };
            const isSuggested = key === suggested;
            rows += `<div style="display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0.75rem;
                border-radius:var(--radius-sm);border:1px solid ${isSuggested ? 'var(--accent)' : 'var(--border-subtle)'};
                background:${isSuggested ? 'var(--accent-glow)' : 'transparent'};margin-bottom:6px">
                <span style="font-size:1.1rem">${m.icon}</span>
                <span style="flex:1;font-size:0.82rem;font-weight:500">${esc(m.label)}</span>
                <span style="font-size:0.68rem;color:var(--text-muted)">${info.status}</span>
                <button class="btn btn-sm ${isSuggested ? 'btn-primary' : 'btn-secondary'}"
                    onclick="modalClose();openSetupWizard('${key}')"
                    style="font-size:0.68rem;padding:2px 8px">Set up →</button>
            </div>`;
        }

        modalOpen({
            title: '🎉 Project saved! Here\u2019s what\u2019s next',
            body: `<p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:var(--space-md)">
                Your project.yml is ready. Set up integrations to build your DevOps pipeline:</p>
                ${rows}`,
            size: 'narrow',
            footerButtons: [
                { label: 'Skip for now', cls: 'btn-ghost', onclick: 'modalClose();switchTab("dashboard")' },
                suggested
                    ? { label: `Set up ${(meta[suggested] || {}).label || suggested} →`, cls: 'btn-primary', onclick: `modalClose();openSetupWizard('${suggested}')` }
                    : { label: 'Go to Dashboard', cls: 'btn-primary', onclick: 'modalClose();switchTab("dashboard")' },
            ],
        });
    }

    /**
     * Auto-trigger Chrome sign-in and fill email via CDP.
     * Called when the page loads with #chrome-signin hash.
     */
    async function _autoTriggerChromeSignin(email, attempt) {
        attempt = attempt || 1;
        const statusEl = document.getElementById('chrome-signin-status');
        const card = document.getElementById('chrome-signin-card');

        if (attempt > 3) {
            if (statusEl) statusEl.innerHTML = '❌ Sign-in page did not appear after 3 attempts.<br>' +
                '<button class="btn btn-sm btn-primary" style="margin-top:10px" ' +
                'onclick="this.parentElement.parentElement.remove()">Dismiss</button>';
            return;
        }

        if (statusEl) statusEl.textContent = '⏳ Attempt ' + attempt + '/3 — triggering Chrome sign-in…';

        try {
            const resp = await fetch('/api/tab-mesh/trigger-chrome-signin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email }),
            });
            const data = await resp.json();

            if (data.success && data.step === 'email_filled') {
                if (statusEl) statusEl.innerHTML =
                    '✅ <strong>Email filled!</strong> Enter your password in the sign-in tab.' +
                    '<br><button class="btn btn-sm btn-ghost" style="margin-top:12px" ' +
                    'onclick="this.parentElement.parentElement.remove()">Dismiss</button>';
                if (card) {
                    card.style.borderColor = 'var(--success, #22c55e)';
                    // Auto-dismiss after 3 seconds
                    setTimeout(() => card.remove(), 3000);
                }
            } else if (data.step === 'waiting_for_signin_page') {
                if (statusEl) statusEl.textContent = '🔄 Sign-in page not yet open — click "Turn on sync" in Chrome settings, retrying in 5s…';
                setTimeout(() => _autoTriggerChromeSignin(email, attempt + 1), 5000);
            } else {
                if (statusEl) statusEl.innerHTML = '❌ ' + (data.message || 'Failed') +
                    '<br><button class="btn btn-sm btn-primary" style="margin-top:10px" ' +
                    'onclick="_autoTriggerChromeSignin(\'' + email.replace(/'/g, "\\'") + '\')">' +
                    'Retry</button>';
            }
        } catch (err) {
            if (statusEl) statusEl.innerHTML = '❌ ' + err.message +
                '<br><button class="btn btn-sm btn-primary" style="margin-top:10px" ' +
                'onclick="_autoTriggerChromeSignin(\'' + email.replace(/'/g, "\\'") + '\')">' +
                'Retry</button>';
        }
    }
</script>
