version: 1
name: devops-control-plane
description: A general-purpose project control plane for DevOps automation
repository: github.com/cyberpunk042/devops-control-plane
owners:
- name: Cyberpunk 042
  github: cyberpunk042
domains:
- library
- ops
- docs
environments:
- default: true
  description: New development
  name: development
- default: false
  description: Production environment
  name: production
modules:
- description: Domain models, services, and engine
  domain: library
  name: core
  path: src/core
  stack: python-lib
- description: Tool bindings for git, docker, etc.
  domain: library
  name: adapters
  path: src/adapters
  stack: python-lib
- description: Click-based CLI interface
  domain: ops
  name: cli
  path: src/ui/cli
  stack: python-cli
- description: Flask admin web interface
  domain: ops
  name: web
  path: src/ui/web
  stack: python-flask
- description: Project documentation
  domain: docs
  name: docs
  path: docs
  stack: markdown
content_folders:
- docs
smart_folders:
- name: code-docs
  label: Code Documentation
  target: code-docs
  sources:
  - path: src/
    pattern: '**/README.md'
external:
  ci: github-actions
pages:
  segments:
  - name: docs
    source: docs
    builder: docusaurus
    path: /docs
    auto: true
    config: {}
  - name: code-docs
    source: code-docs
    builder: docusaurus
    path: /code-docs
    auto: true
    config: {}
artifacts:
  targets:
  - name: local-install
    kind: local
    builder: makefile
    build_target: install
    description: Editable pip install on this machine
    modules:
    - core
    - adapters
    - cli
    - web
    config: {}
  - name: quality-check
    kind: local
    builder: makefile
    description: Run all checks (lint + types + test)
    build_target: check
    build_cmd: ''
    output_dir: dist/
    modules: []
    config: {}
  - name: clean
    kind: local
    builder: makefile
    description: Remove build artifacts and caches
    build_target: clean
    build_cmd: ''
    output_dir: dist/
    modules: []
    config: {}
  - name: pip-package
    kind: package
    builder: pip
    description: Build pip wheel/sdist from pyproject.toml
    build_target: ''
    build_cmd: .venv/bin/python -m build
    output_dir: dist/
    modules: []
    config: {}
  - name: container
    kind: container
    builder: docker
    description: Build Docker container image
    build_target: ''
    build_cmd: docker build -t devops-control-plane .
    output_dir: dist/
    modules: []
    config:
      tag: ''
      dockerfile: Dockerfile
kubernetes:
  _services:
  - name: cli
    kind: Deployment
    image: ghcr.io/cyberpunk042/devops-control-plane-cli:latest
    envVars: []
    resources: null
    companions: []
    dependencies: []
    port: '8000'
    replicas: '2'
    serviceType: ClusterIP
    strategy: RollingUpdate
    maxSurge: '1'
    maxUnavailable: '1'
    readinessProbe:
      type: http
      initialDelaySeconds: 5
      periodSeconds: 5
      path: /health
      port: 8000
      extra: 3
    livenessProbe:
      type: http
      initialDelaySeconds: 10
      periodSeconds: 15
      path: /health
      port: 8000
      extra: 3
    volumes: []
    initContainers: []
    sidecars: []
  - name: web
    kind: Deployment
    image: ghcr.io/cyberpunk042/devops-control-plane-web:latest
    envVars: []
    resources: null
    companions: []
    dependencies:
    - mysql
    port: '8001'
    replicas: '2'
    serviceType: ClusterIP
    strategy: RollingUpdate
    maxSurge: '1'
    maxUnavailable: '1'
    readinessProbe:
      type: http
      initialDelaySeconds: 5
      periodSeconds: 5
      path: /health
      port: 8001
      extra: 3
    livenessProbe:
      type: http
      initialDelaySeconds: 10
      periodSeconds: 15
      path: /health
      port: 8001
      extra: 3
    volumes: []
    initContainers:
    - name: wait-for-http
      image: curlimages/curl:latest
      command: sh -c
    sidecars:
    - name: config-reloader
      image: jimmidyson/configmap-reload:v0.13
      command: ''
      nativeSidecar: true
    mesh:
      provider: istio
      proxyCpuRequest: 100m
      proxyCpuLimit: 500m
      proxyMemRequest: 128Mi
      proxyMemLimit: 256Mi
      excludeInbound: ''
      excludeOutbound: ''
      logLevel: warning
  _infraDecisions:
  - name: mysql
    kind: StatefulSet
    image: mysql:8
    port: '3306'
    envVars:
    - key: MYSQL_DATABASE
      type: variable
      value: ${MYSQL_DATABASE}
      varName: ${MYSQL_DATABASE}
      createInVault: true
      newValue: ''
    - key: MYSQL_PASSWORD
      type: secret
      value: ${MYSQL_PASSWORD}
      varName: ${MYSQL_PASSWORD}
      createInVault: true
      newValue: ''
    - key: MYSQL_ROOT_PASSWORD
      type: secret
      value: ${MYSQL_ROOT_PASSWORD}
      varName: ${MYSQL_ROOT_PASSWORD}
      createInVault: true
      newValue: ''
    - key: MYSQL_USER
      type: variable
      value: ${MYSQL_USER}
      varName: ${MYSQL_USER}
      createInVault: true
      newValue: ''
    volumes: []
  namespace: devops-control-plane-development
  output_dir: k8s/
  ingress: false
  skaffold: true
  skaffold_config:
    deploy_method: kustomize
    tag_policy: gitCommit
    profiles:
    - dev-from-local
    - local
    - development
    - production
    port_forward: true
    file_sync: false
    server_side_apply: false
    post_deploy_verify: true
    pre_deploy: []
    post_deploy: []
  helm_chart: true
  helm_config:
    chart_name: ''
    chart_dir: charts/
    chart_version: 0.1.0
    app_version: 1.0.0
    description: ''
    env_values: true
    helmignore: true
  _savedAt: '2026-02-23T23:40:29.064889+00:00'
  _version: 1
